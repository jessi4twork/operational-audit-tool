<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
    <link rel="stylesheet" href="styles.css"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>

  <body>
    <h1 id="title">Professional Service Intake</h1>
    <p id="description">Identify your current bottleneck for a streamline audit.</p>
    <form 
      id="survey-form"
      action="https://formspree.io/f/meerjrvb"
      method="POST"
      >
      <input type="hidden" name="_next" value="https://jessi4twork.github.io/thank-you.html">
      <fieldset>
        <label 
        id="name-label"
        for="name">Name: 
          <input 
          name="name"
          id="name" 
          type="text"
          placeholder="First Name, Last Name"
          required
          />
        </label>
        <div></div>
        <label
        id="email-label" 
        for="email">Email Address: 
          <input 
          name="email"
          id="email"
          type="email"
          placeholder="email@domain.com"
          required
          />
        </label>
        <div></div>
        <label 
        id="tel-label"
        for="number">Phone Number: 
          <input
          name="phone"
          id="tel"
          type="tel"
          placeholder="e.g.+34 000 000 000"
          minlength="10"
          maxlength="15"
          required
          />
        </label>
      </fieldset>
      <fieldset>
        <label for="dropdown-problem">What is your primary bottleneck? 
          <select 
          id="dropdown-problem"
          name="dropdown-problem"
          required
          >
            <option disabled selected value="">Select the issue...</option>
            <option value="mess">Disorganized Processes (Chaos)</option>
            <option value="time">Too Much Manual Work (Time Waste)</option>
            <option value="growth">Can't Scale (Growth Blocked)</option>
            <option value="data">Losing Information (Data Leakage)</option>
          </select>
        </label>
        <div></div>
        <label id="dropdown-label" for="dropdown-size">Business Size
          <select 
            id="dropdown-size" 
            name="dropdown-size" 
            required>
            <option disabled selected value="">Select size...</option>
            <option value="solo">Solo / Freelancer</option>
            <option value="small">Small (1-10 staff)</option>
            <option value="mid">Growing (11-50 staff)</option>
            <option value="large">Enterprise (50+ staff)</option>
          </select>
        </label>
        <div></div>
      </fieldset>
      <fieldset>
        <label>Current Tools (Select all that apply):
          <label>
            <input 
            name="tools"
            type="checkbox" 
            value="excel"
            > Spreadsheets / Excel
          </label>
          <label>
            <input 
            name="tools"
            type="checkbox" 
            value="paper"
            > Paper / Physical Files
          </label>
          <label>
            <input 
            name="tools"
            type="checkbox" 
            value="email"
            > Email / Messaging
          </label>
          <label>
            <input 
            name="tools"
            type="checkbox" 
            value="social"> Social Media Apps
          </label>
        </label>
      </fieldset>
      <fieldset>
        <p>Project Urgency Status:</p>
        <label>
          <input 
            name="urgency" 
            type="checkbox" 
            value="asap" 
            checked> ASAP (Critical Bottleneck)
        </label>
        <label>
          <input 
            name="urgency" 
            type="checkbox" 
            value="month"> Within 30 Days (Planned)
        </label>
        <label>
          <input 
            name="urgency" 
            type="checkbox" 
            value="research"> Research Phase (Low Priority)
        </label>
      </fieldset>
      <fieldset>
        <label id="textarea-label">Where is the process breaking?
          <textarea 
          id="comments" 
          name="bottleneck" 
          placeholder="Describe the main time-waster...">
          </textarea>
        </label>
      </fieldset>
      <button id="submit">Initialize Audit</button>
    </form>
  </body>
</html>
